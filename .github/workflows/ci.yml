name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hera-invitational-rankings
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hera-invitational-rankings/package-lock.json
      - run: npm ci
      - run: npm run build
